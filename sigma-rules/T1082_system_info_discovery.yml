title: System Information Discovery via PowerShell
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: Detects system information collection via systeminfo and Get-ComputerInfo consistent with T1082
references:
    - https://attack.mitre.org/techniques/T1082/
author: Yushen Chen
date: 2026/05/20
tags:
    - attack.discovery
    - attack.t1082
logsource:
    product: windows
    service: powershell
detection:
    keywords:
        - 'systeminfo'
        - 'Get-ComputerInfo'
        - 'Get-WmiObject Win32_ComputerSystem'
    condition: keywords
falsepositives:
    - IT support and monitoring tools
    - System inventory scripts
    - Help desk remote assistance
level: low